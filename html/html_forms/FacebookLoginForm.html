<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>FacebookLoginForm</title>
</head>
<body>
	<!-- Forms - Using Table -->
	<center>
		<!-- Form Table -->
		<form action="">
			<table style="font-size: 35px; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;">
				<!-- Form Table - caption -->
				<caption
					style="font-size: 50px; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; font-weight: bold;">
					Facebook Login Form</caption>
				<!-- Form Table - Body -->
				<tbody style="font-size: 35px; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;">
					<!-- Form Table Body - Rows -->
					<!-- 1st row -->
					<tr>
						<td><label for="">Username</label></td>
						<td colspan="5"><input style="font-size: 35px; background-color: lightgray; border: none; outline: none;" type="text"  name="" id=""></td>
					</tr>
	
					<!-- 2nd row -->
					<tr>
						<td><label for="">Password</label></td>
						<td colspan="5"><input style="font-size: 35px; background-color: lightgray; border: none; outline: none;" type="password" name="" id=""></td>
					</tr>
	
					<!-- 3rd row -->
					<tr>
						<td><label for="">Age</label></td>
						<td colspan="5"><input style="font-size: 35px; background-color: lightgray; border: none; outline: none;" type="number" name="" id=""></td>
					</tr>
	
					<!-- 4th row -->
					<tr>
						<td><label for="">PhoneNumber</label></td>
						<td colspan="5"><input style="font-size: 35px; background-color: lightgray; border: none; outline: none;" type="tel" name="" id=""></td>
					</tr>

					<!-- 5th row -->
					<tr>
						<td><label for="">Email</label></td>
						<td colspan="5"><input style="font-size: 35px; background-color: lightgray; border: none; outline: none;" type="email" name="" id=""></td>
					</tr>

					<!-- 6th row -->
					<tr>
						<td><label for="">Color</label></td>
						<td colspan="5"><input style="font-size: 35px; background-color: lightgray; border: none; outline: none;" type="color" name="" id=""></td>
					</tr>

					<!-- 7th row -->
					<tr>
						<td><label for="">Date</label></td>
						<td colspan="5"><input style="font-size: 35px; background-color: lightgray; border: none; outline: none;" type="date" name="" id=""></td>
					</tr>

					<!-- 8th row -->
					<tr>
						<td><label for="">Month</label></td>
						<td colspan="5"><input style="font-size: 35px; background-color: lightgray; border: none; outline: none;" type="month" name="" id=""></td>
					</tr>

					<!-- 9th row -->
					<tr>
						<td><label for="">Week</label></td>
						<td colspan="5"><input style="font-size: 35px; background-color: lightgray; border: none; outline: none;" type="week" name="" id=""></td>
					</tr>

					<!-- 10ht row -->
					<tr>
						<td><label for="">Time</label></td>
						<td colspan="5"><input style="font-size: 35px; background-color: lightgray; border: none; outline: none;" type="time" name="" id=""></td>
					</tr>

					<!-- 11th row -->
					<tr>
						<td><label for="">DateTime</label></td>
						<td colspan="5"><input style="font-size: 35px; background-color: lightgray; border: none; outline: none;" type="datetime-local" name="" id=""></td>
					</tr>

					<!-- 12th row -->
					<tr>
						<td><label for="">Gender</label></td>
						<td><input style="width: 25px; height:25px;" type="radio" name="gender" id=""><label for="">Male</label></td>
						<td><input style="width: 25px; height:25px;" type="radio" name="gender" id=""><label for="">Female</label></td>
						<td><input style="width: 25px; height:25px;" type="radio" name="gender" id=""><label for="">Transgender</label></td>
					</tr>

					<!-- 13th row -->
					<tr>
						<td><label for="">SkillSet</label></td>
						<td><input style="width: 25px; height:25px;" type="checkbox" name="HTML" id=""><label for="">HTML</label></td>
						<td><input style="width: 25px; height:25px;" type="checkbox" name="CSS" id=""><label for="">CSS</label></td>
						<td><input style="width: 25px; height:25px;" type="checkbox" name="JS" id=""><label for="">JS</label></td>
						<td><input style="width: 25px; height:25px;" type="checkbox" name="ReacJS" id=""><label for="">ReactJS</label></td>
						<td><input style="width: 25px; height:25px;" type="checkbox" name="TS" id=""><label for="">TS</label></td>
					</tr>

					<!-- 14th row -->
					<tr>
						<td><label for="">Google</label></td>
						<td colspan="5"><input style="font-size: 35px; width: 750px; background-color: lightgray; border: none; outline: none; border-radius: 35px;" type="search" name="Google" id=""></td>
					</tr>

					<!-- 15th row -->
					<tr>
						<td><label for="">Brightness</label></td>
						<td colspan="5"><input style="width: 750px;" type="range" name="Brightness" id=""></td>
					</tr>

					<!-- 16th row -->
					<tr>
						<td><label for="">Resume</label></td>
						<td colspan="5"><input style="font-size: 35px;" type="file" name="Resume" id=""></td>
					</tr>
	
					<!-- Last row -->
					<tr>
						<td colspan="3" style="text-align: center;"><input style="font-size: 50px; color: white; background-color: green; border: none; outline: none;" type="submit" value="Login" name=""
								id=""></td>
						<td colspan="3" style="text-align: center;"><input style="font-size: 50px; color: white; background-color: red; border: none; outline: none;" type="reset" value="Cancel" name=""
								id=""></td>
					</tr>
				</tbody>
			</table>
		</form>
	</center>
</body>
</html>
