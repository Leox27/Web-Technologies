<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Document</title>
</head>
<body>
	<!-- HTML Forms -->
	 <h1 style="font-size: 50px; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;">HTML Forms</h1>
	 <form style="font-size: 35px; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;" action="">
		<label for="">Username</label>
		<input style="font-size: 35px; background-color: lightgray; border: none; outline: none;" type="text" name="" id="">
		<br><br>
		<label for="">Password</label>
		<input style="font-size: 35px; background-color: lightgray; border: none; outline: none;" type="password" name="" id="">
		<br><br>
		<label for="">Age</label>
		<input style="font-size: 35px; background-color: lightgray; border: none; outline: none;" type="number" name="" id="">
		<br><br>
		<label for="">PhoneNumber</label>
		<input style="font-size: 35px; background-color: lightgray; border: none; outline: none;" type="tel" name="" id="">
		<br><br>
		<input style="font-size: 50px; color: white; background-color: green; border: none;" type="submit" value="Login" name="" id="">
		<input style="font-size: 50px; color: white; background-color: red; border: none;" type="reset" value="Cancel" name="Cancel" id="">
	 </form>
	
	 
	<!-- Forms - Using Table -->
	<center>
		<!-- Form Table -->
		<form action="">
			<table style="font-size: 35px; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;">
				<!-- Form Table - caption -->
				<caption
					style="font-size: 50px; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; font-weight: bold;">
					HTML Forms</caption>
				<!-- Form Table - Body -->
				<tbody style="font-size: 35px; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;">
					<!-- Form Table Body - Rows -->
					<!-- 1st row -->
					<tr>
						<td><label for="">Username</label></td>
						<td><input style="font-size: 35px; background-color: lightgray; border: none; outline: none;" type="text"  name="" id=""></td>
					</tr>
	
					<!-- 2nd row -->
					<tr>
						<td><label for="">Password</label></td>
						<td><input style="font-size: 35px; background-color: lightgray; border: none; outline: none;" type="text" name="" id=""></td>
					</tr>
	
					<!-- 3rd row -->
					<tr>
						<td><label for="">Age</label></td>
						<td><input style="font-size: 35px; background-color: lightgray; border: none; outline: none;" type="number" name="" id=""></td>
					</tr>
	
					<!-- 4th row -->
					<tr>
						<td><label for="">PhoneNumber</label></td>
						<td><input style="font-size: 35px; background-color: lightgray; border: none; outline: none;" type="number" name="" id=""></td>
					</tr>
	
					<!-- 5th row -->
					<tr>
						<td style="text-align: center;"><input style="font-size: 50px; color: white; background-color: green; border: none; outline: none;" type="submit" value="Login" name=""
								id=""></td>
						<td style="text-align: center;"><input style="font-size: 50px; color: white; background-color: red; border: none; outline: none;" type="reset" value="Cancel" name=""
								id=""></td>
					</tr>
				</tbody>
			</table>
		</form>
	</center>
</body>
</html>
