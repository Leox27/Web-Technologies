<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TaskOnDivisions</title>
</head>
<body style="font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; font-size: 75px;">
  <!-- Header -->
  <div style="text-align: center; width: 2000px; height: 100px; background-color: grey;">Header</div>

  <!-- Middle Part -->
  <div style="text-align: center; width: 2000px; height: 400px;">

    <!-- Right side AsideOne & AsideTwo -->
    <div style="width: 25%; height: 400px; float: left;">
      <div style="height: 200px; background-color: aqua;">AsideOne</div>
      <div style="height: 200px; background-color: blue; color: white;">AsideTwo</div>
    </div>

    <!-- Left side D's -->
    <div style="width: 75%; height: 400px; float: left;">
      <!-- Row 1 -->
      <div style="height: 133.33px;">
        <div style="width: 25%; height: 100%; float: left; background-color: bisque;">DOne</div>
        <div style="width: 25%; height: 100%; float: left; background-color: rgb(218, 137, 79);">DTwo</div>
        <div style="width: 25%; height: 100%; float: left; background-color: rgb(188, 77, 77);">DThree</div>
        <div style="width: 25%; height: 100%; float: left; background-color: brown; color: white;">DFour</div>
      </div>

      <!-- Row 2 -->
      <div style="height: 133.33px;">
        <div style="width: 33.33%; height: 100%; float: left; background-color: orange;">DFive</div>
        <div style="width: 33.33%; height: 100%; float: left; background-color: white;">DSix</div>
        <div style="width: 33.33%; height: 100%; float: left; background-color: green;">DSeven</div>
      </div>

      <!-- Row 3 -->
      <div style="height: 133.33px;">
        <div style="width: 20%; height: 100%; float: left; background-color: rgb(206, 206, 206);">DEight</div>
        <div style="width: 20%; height: 100%; float: left; background-color: rgb(155, 155, 155);">DNine</div>
        <div style="width: 20%; height: 100%; float: left; background-color: grey;">DTen</div>
        <div style="width: 20%; height: 100%; float: left; background-color: yellow; color: white;">DEleven</div>
        <div style="width: 20%; height: 100%; float: left; background-color: rgb(155, 155, 155); color: yellow;">DTwelve</div>
      </div>

    </div>
  </div>

  <!-- Footer -->
  <div style="text-align: center; width: 2000px; height: 200px; color: white; background-color: black;">Footer</div>
</body>
</html>
