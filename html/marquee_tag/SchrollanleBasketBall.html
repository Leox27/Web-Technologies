<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SchrollableBasketBall</title>
</head>
<body>
  <marquee behavior="scrollable" direction="right" scrollamount="70" loop="4" scrollamount="60" style="width: 100%; background-color: lightgray;">
    <img style="width: 200px;" src="X:\GitHub\QSpider\WebTechnologies-A11\assets\images\BasketBall.png" alt="">
  </marquee>
  
  <marquee behavior="slide" direction="down" scrollamount="60" loop="10" style="float: right; background-color: aqua; width: 50%; height: 630px;">
    <img style="width: 200px;" src="X:\GitHub\QSpider\WebTechnologies-A11\assets\images\BasketBall.png" alt="">
  </marquee>

  <marquee behavior="alternate" direction="up" scrollamount="200" style="width: 50%; background-color: lightgreen; height: 630px; float: right;">
    <img style="width: 200px;" src="X:\GitHub\QSpider\WebTechnologies-A11\assets\images\BasketBall.png" alt="">
  </marquee>

</body>
</html>
