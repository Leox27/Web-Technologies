<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MarqueeTag</title>
</head>
<body>
  <marquee behavior="" direction="" style="color: white; background-color: red; width: 50%;">
    <b style="font-size: 75px; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;">SchrollableContent</b>
  </marquee>
  
  <marquee behavior="" direction="up" style="width: 50%; background-color: lightgray;">
    <p style="font-size: 35px; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;">
      WebDevelopment is the process of designing and developing front-end webpages by using HTML, CSS, JAVASCRIPT and ReactJavaScript.
    </p>
  </marquee>
</body>
</html>
