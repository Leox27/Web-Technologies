<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>W3SchoolsWebPageStructure</title>
</head>
<body style="font-size: 50px; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; font-weight: bold; text-align: center;">
    <header style="width: 100%; height: 100px; background-color: lightgray;">Header</header>
    <nav style="width: 100%; height: 70px; background-color: hotpink;">NavigationBar</nav>
    <aside style="width: 25%; height: 500px; background-color: orange; float: left;">LeftAside</aside>
    <main style="width: 50%; height: 500px; float: left;">
        <article style="width: 100%; height: 100%; background-color: peachpuff;">
            <section style="width: 100%; height: 25%; background-color: lightblue;">Section</section>
            <figure style="width: 90%; height: 55%; color: white; background-color: navy;">Figure</figure>
        </article>
    </main>
    <aside style="width: 25%; height: 500px; background-color: orange; float: right;">RightAside</aside>

</body>
</html>
