<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CombinatorSelectors</title>
    <link rel="stylesheet" href="CombinatorSelectors.css">
</head>
<body>
    <h1 id="topic_heading">CombinatorSelectors</h1>
    <div id="parent_block">
        <div id="child_block"></div>
    </div>

    <div id="grand_parent_element">
        <div id="parent_element" class="apply_same_dimensions">
            <div id="child_element" class="apply_same_dimensions">
                <div id="grand_child_element" class="apply_same_dimensions">
                    <div id="great_grand_child_element" class="apply_same_dimensions"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Adjacent sibling selector [element and immediate sibling element]-->
    <!-- General sibling selector [element and not-immediate sibling element]-->
    <div id="navy_color_block" class="color_blocks"></div>
    <div id="light_gray_color_block" class="color_blocks"></div>
    <div id="black_color_block" class="color_blocks"></div>
    <div id="orange_color_block" class="color_blocks"></div>
    <div id="white_color_block" class="color_blocks"></div>
    <div id="green_color_block" class="color_blocks"></div>
</body>
</html>
