<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GoogleDoodleTask</title>
    <link rel="stylesheet" href="GoogleDoodleTask.css">
</head>
<body>
    <center>
        <div id="google_doodles_container">
            <div class="google_doodles royalblue_doodles">
                <marquee class="google_doodle_marquees" behavior="alternate" direction="down" scrollamount="50">G</marquee>
            </div>
        
            <div class="google_doodles red_doodles">
                <marquee class="google_doodle_marquees" behavior="alternate" direction="down" scrollamount="47">o</marquee>
            </div>
        
            <div class="google_doodles" id="o_doodle">
                <marquee class="google_doodle_marquees" behavior="alternate" direction="down" scrollamount="44">o</marquee>
            </div>
        
            <div class="google_doodles royalblue_doodles">
                <marquee class="google_doodle_marquees" behavior="alternate" direction="down" scrollamount="41">g</marquee>
            </div>
        
            <div class="google_doodles" id="l_doodle">
                <marquee class="google_doodle_marquees" behavior="alternate" direction="down" scrollamount="38">l</marquee>
            </div>
        
            <div class="google_doodles red_doodles">
                <marquee class="google_doodle_marquees" behavior="alternate" direction="down" scrollamount="35">e</marquee>
            </div>
        </div>
    </center>

</body>
</html>
