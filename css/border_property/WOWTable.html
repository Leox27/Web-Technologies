<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WOWTable</title>
    <link rel="stylesheet" href="WOWTable.css">
</head>
<body>
    <center>
        <!-- WOW Table -->
        <table id="wow_table">
            <!-- <caption></caption> -->
            <!-- <thead></thead> -->

            <!-- WOW Table: body -->
            <tbody id="wow_table_body">
                <!-- 1st row -->
                <tr class="wow_table_body_rows">
                    <th class="wow_table_body_cells empty_cells"></th>
                    <th id="w_one_cell" class="wow_table_body_cells w_o_border">W</th>
                    <th class="wow_table_body_cells empty_cells"></th>
                </tr>
                <!-- 2nd row -->
                <tr class="wow_table_body_rows">
                    <th id="w_two_cell" class="wow_table_body_cells w_o_border">W</th>
                    <th id="o_cell" class="wow_table_body_cells">O</th>
                    <th id="w_three_cell" class="wow_table_body_cells w_o_border">W</th>
                </tr>
                <!-- 3rd row -->
                <tr class="wow_table_body_rows">
                    <th class="wow_table_body_cells empty_cells"></th>
                    <th id="w_four_cell" class="wow_table_body_cells w_o_border">W</th>
                    <th class="wow_table_body_cells empty_cells"></th>
                </tr>
            </tbody>
        </table>
    </center>
</body>
</html>
