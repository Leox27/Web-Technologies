<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GoogleDoodlesAnimation</title>
    <link rel="stylesheet" href="GoogleDoodlesAnimation.css">
</head>
<body>
    <div id="google_doodles_container">
        <button id="doodle_animation_button">Animate</button>
        <div class="google_doodles royal_blue_texts" id="uppercase_g_doodle">G</div>
        <div class="google_doodles red_texts" id="first_o_doodle">o</div>
        <div class="google_doodles orange_texts" id="second_o_doodle">o</div>
        <div class="google_doodles royal_blue_texts" id="lowercase_g_doodle">g</div>
        <div class="google_doodles green_texts" id="l_doodle">l</div>
        <div class="google_doodles red_texts" id="e_doodle">e</div>
    </div>
</body>
</html>
